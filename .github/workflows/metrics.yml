name: Metricas (commits + linguagens)

on:
  # Atualiza todo dia as 3h (UTC)
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token pessoal (PAT) — precisa ser criado e salvo como secret METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN }}
          user: EngLeandro07
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Manaus

          # --- Gráfico de linguagens mais usadas ---
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # --- Calendário isométrico (blocos de commits em 3D) ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # --- Hábitos e estatísticas de commits ---
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
